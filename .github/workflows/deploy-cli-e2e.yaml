name: Deploy CLI E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  deploy-cli-e2e:
    name: k3s lifecycle E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run deploy CLI lifecycle E2E
        run: bun run scripts/deploy-cli-e2e.ts
        env:
          DEPLOY_E2E_SOURCE_REF: ${{ github.sha }}
          DEPLOY_E2E_UPGRADE_VERSION: "0.4.0"
          DEPLOY_E2E_UPGRADE_DEPS_VERSION: "0.4.0"

      - name: Upload deploy CLI E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-cli-e2e-artifacts
          path: .tmp/deploy-cli-e2e
          if-no-files-found: ignore
