name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: packages/envsync-cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: packages/envsync-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVSYNC_API_URL: ${{ secrets.ENVSYNC_API_URL }}

  build-api-image:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Keycloak is intentionally built from repo source during local/E2E/self-hosted
      # deploy flows. This workflow only publishes the API image.

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/envsync-cloud/envsync-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stable
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/envsync-api
          file: packages/envsync-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-management-api-image:
    name: Build & Push Management API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/envsync-cloud/envsync-management-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stable
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/management-api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend-static-images:
    name: Build & Push Frontend Static Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: envsync-web
            build_script: build:oss
            context: apps/envsync-web
            image: ghcr.io/envsync-cloud/envsync-web-oss-static
          - package_name: envsync-web
            build_script: build:enterprise
            context: apps/envsync-web
            image: ghcr.io/envsync-cloud/envsync-web-static
          - package_name: envsync-landing
            build_script: build
            context: apps/envsync-landing
            image: ghcr.io/envsync-cloud/envsync-landing-static
    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${TAG_NAME}" != "v${ROOT_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match root package version v${ROOT_VERSION}"
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript SDK
        run: bun run --filter @envsync-cloud/envsync-ts-sdk build

      - name: Build Management TypeScript SDK
        run: bun run --filter @envsync-cloud/envsync-management-ts-sdk build

      - name: Build frontend app
        run: bun run --filter ${{ matrix.package_name }} ${{ matrix.build_script }}
        env:
          VITE_API_BASE_URL: https://placeholder.invalid
          VITE_HYPERDX_DISABLED: "true"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stable
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: docker/frontend-static.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-oss-deploy:
    name: Publish OSS Deploy CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release versions
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          DEPLOY_VERSION=$(node -p "require('./packages/deploy/package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${TAG_NAME}" != "v${ROOT_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match root package version v${ROOT_VERSION}"
            exit 1
          fi

          if [ "${DEPLOY_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "deploy-cli version ${DEPLOY_VERSION} does not match root version ${ROOT_VERSION}"
            exit 1
          fi

      - name: Build OSS deploy CLI
        working-directory: packages/deploy
        run: bun run build

      - name: Dry-run npm pack
        working-directory: packages/deploy
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: packages/deploy
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-enterprise-deploy-cli:
    name: Publish Enterprise Deploy CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@envsync-cloud"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release versions
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          DEPLOY_VERSION=$(node -p "require('./packages/deploy-cli/package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${TAG_NAME}" != "v${ROOT_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match root package version v${ROOT_VERSION}"
            exit 1
          fi

          if [ "${DEPLOY_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "deploy-cli version ${DEPLOY_VERSION} does not match root version ${ROOT_VERSION}"
            exit 1
          fi

      - name: Build enterprise deploy CLI
        working-directory: packages/deploy-cli
        run: bun run build

      - name: Dry-run npm pack
        working-directory: packages/deploy-cli
        run: npm pack --dry-run

      - name: Publish to GitHub Packages
        working-directory: packages/deploy-cli
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-ts-sdk:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release versions
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          SDK_VERSION=$(node -p "require('./sdks/envsync-ts-sdk/package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${TAG_NAME}" != "v${ROOT_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match root package version v${ROOT_VERSION}"
            exit 1
          fi

          if [ "${SDK_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "TypeScript SDK version ${SDK_VERSION} does not match root version ${ROOT_VERSION}"
            exit 1
          fi

      - name: Build TypeScript SDK
        working-directory: sdks/envsync-ts-sdk
        run: bun run build

      - name: Dry-run npm pack
        working-directory: sdks/envsync-ts-sdk
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: sdks/envsync-ts-sdk
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-management-ts-sdk:
    name: Publish Management TypeScript SDK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@envsync-cloud"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release versions
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          SDK_VERSION=$(node -p "require('./sdks/envsync-management-ts-sdk/package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${TAG_NAME}" != "v${ROOT_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match root package version v${ROOT_VERSION}"
            exit 1
          fi

          if [ "${SDK_VERSION}" != "${ROOT_VERSION}" ]; then
            echo "Management TypeScript SDK version ${SDK_VERSION} does not match root version ${ROOT_VERSION}"
            exit 1
          fi

      - name: Build Management TypeScript SDK
        working-directory: sdks/envsync-management-ts-sdk
        run: bun run build

      - name: Dry-run npm pack
        working-directory: sdks/envsync-management-ts-sdk
        run: npm pack --dry-run

      - name: Publish to GitHub Packages
        working-directory: sdks/envsync-management-ts-sdk
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
