name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  publish-ts-sdk:
    name: Publish TS SDK to npm
    runs-on: ubuntu-latest
    container:
      image: oven/bun:1.3.9
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun run scripts/set-package-version.ts sdks/envsync-ts-sdk "$VERSION"
          test "$(bun -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('./sdks/envsync-ts-sdk/package.json', 'utf8')).version)")" = "$VERSION"

      - name: Configure npm auth
        run: |
          cat <<EOF > ~/.npmrc
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          EOF

      - name: Build TS SDK
        run: bun run --cwd sdks/envsync-ts-sdk build

      - name: Validate TS SDK tarball
        run: bunx npm@10.9.2 pack --dry-run
        working-directory: sdks/envsync-ts-sdk

      - name: Publish TS SDK
        run: bunx npm@10.9.2 publish --access public
        working-directory: sdks/envsync-ts-sdk

  publish-deploy-cli-npm:
    name: Publish deploy CLI to npm
    runs-on: ubuntu-latest
    container:
      image: oven/bun:1.3.9
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun run scripts/set-package-version.ts packages/envsync-deploy-cli "$VERSION"
          test "$(bun -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('./packages/envsync-deploy-cli/package.json', 'utf8')).version)")" = "$VERSION"

      - name: Configure npm auth
        run: |
          cat <<EOF > ~/.npmrc
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          EOF

      - name: Build deploy CLI
        run: bun run --cwd packages/envsync-deploy-cli build

      - name: Validate deploy CLI tarball
        run: bunx npm@10.9.2 pack --dry-run
        working-directory: packages/envsync-deploy-cli

      - name: Publish deploy CLI
        run: bunx npm@10.9.2 publish --access public
        working-directory: packages/envsync-deploy-cli

  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: packages/envsync-cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: packages/envsync-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVSYNC_API_URL: ${{ secrets.ENVSYNC_API_URL }}

  build-api-image:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/envsync-cloud/envsync-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/envsync-api
          file: packages/envsync-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-deploy-cli-image:
    name: Build & Push deploy CLI image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Sync package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun run scripts/set-package-version.ts packages/envsync-deploy-cli "$VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/envsync-cloud/deploy-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/envsync-deploy-cli/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
