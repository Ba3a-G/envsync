services:
  postgres:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-envsync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [envsync_network]

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [envsync_network]

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "${RUSTFS_PORT:-19000}:9000"
      - "${RUSTFS_HTTP_PORT:-19001}:9001"
    restart: unless-stopped
    environment:
      RUSTFS_DATA_DIR: /data
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data
    networks: [envsync_network]

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    volumes:
      - mailpit_data:/data
    networks: [envsync_network]

  keycloak_db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks: [envsync_network]

  keycloak:
    build:
      context: ./packages/envsync-keycloak-theme
      dockerfile: Dockerfile
    image: envsync-keycloak:local
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-lc"]
    command:
      [
        "/opt/keycloak/bin/kc.sh import --dir /opt/keycloak/data/import --override true && exec /opt/keycloak/bin/kc.sh start-dev"
      ]
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./docker/keycloak/realm-import:/opt/keycloak/data/import:ro
    depends_on:
      - keycloak_db
    networks: [envsync_network]

  openfga_db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: openfga
      POSTGRES_PASSWORD: ${OPENFGA_DB_PASSWORD:-openfga}
      POSTGRES_DB: openfga
    volumes:
      - openfga_db_data:/var/lib/postgresql/data
    networks: [envsync_network]

  openfga_migrate:
    image: openfga/openfga:v1.12.0
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:${OPENFGA_DB_PASSWORD:-openfga}@openfga_db:5432/openfga?sslmode=disable
    depends_on:
      - openfga_db
    networks: [envsync_network]
    restart: "no"

  openfga:
    image: openfga/openfga:v1.12.0
    restart: unless-stopped
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:${OPENFGA_DB_PASSWORD:-openfga}@openfga_db:5432/openfga?sslmode=disable
      OPENFGA_HTTP_ADDR: 0.0.0.0:8090
      OPENFGA_GRPC_ADDR: 0.0.0.0:8091
    ports:
      - "${OPENFGA_HTTP_PORT:-8090}:8090"
      - "${OPENFGA_GRPC_PORT:-8091}:8091"
    depends_on:
      - openfga_migrate
    networks: [envsync_network]

  minikms_db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "${MINIKMS_DB_PORT:-5544}:5432"
    environment:
      POSTGRES_USER: ${MINIKMS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${MINIKMS_DB_PASSWORD:-postgres}
      POSTGRES_DB: minikms
    volumes:
      - minikms_db_data:/var/lib/postgresql/data
    networks: [envsync_network]

  minikms_migrate:
    image: postgres:17
    command: ["sh", "-c", "psql -h minikms_db -U ${MINIKMS_DB_USER:-postgres} -d minikms -f /migrations/001_initial_schema.sql && psql -h minikms_db -U ${MINIKMS_DB_USER:-postgres} -d minikms -f /migrations/002_vault_storage.sql"]
    environment:
      PGPASSWORD: ${MINIKMS_DB_PASSWORD:-postgres}
    volumes:
      - ./docker/minikms/migrations:/migrations:ro
    depends_on:
      - minikms_db
    networks: [envsync_network]
    restart: "no"

  minikms:
    image: ghcr.io/envsync-cloud/minikms:sha-735dfe8
    ports:
      - "${MINIKMS_GRPC_PORT:-50051}:50051"
    restart: unless-stopped
    environment:
      MINIKMS_ROOT_KEY: ${MINIKMS_ROOT_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      MINIKMS_DB_URL: postgres://${MINIKMS_DB_USER:-postgres}:${MINIKMS_DB_PASSWORD:-postgres}@minikms_db:5432/minikms?sslmode=disable
      MINIKMS_REDIS_URL: redis://redis:6379
      MINIKMS_GRPC_ADDR: 0.0.0.0:50051
    depends_on:
      - minikms_migrate
      - redis
    networks: [envsync_network]

  clickstack:
    image: clickhouse/clickstack-all-in-one:latest
    restart: unless-stopped
    environment:
      HYPERDX_IMAGE: all-in-one-noauth
      IS_LOCAL_APP_MODE: DANGEROUSLY_is_local_app_mode💀
      INGESTION_API_KEY: envsync-local
    ports:
      - "${CLICKSTACK_PORT:-8800}:8080"
      - "${CLICKSTACK_OTEL_GRPC_PORT:-4317}:4317"
      - "${CLICKSTACK_OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - clickstack_data:/data/db
      - clickstack_ch_data:/var/lib/clickhouse
      - clickstack_ch_logs:/var/log/clickhouse-server
      - clickstack_supervisor_data:/etc/otel/supervisor-data
    networks: [envsync_network]

  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.111.0
    user: "0:0"
    restart: unless-stopped
    command: ["--config=/etc/otel-agent.yaml"]
    ports:
      - "${OTEL_AGENT_OTLP_GRPC_PORT:-14317}:4317"
      - "${OTEL_AGENT_OTLP_HTTP_PORT:-14318}:4318"
    volumes:
      - ./docker/otel-agent/otel-agent-config.local.yaml:/etc/otel-agent.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /:/hostfs:ro
    depends_on:
      - clickstack
    networks: [envsync_network]

networks:
  envsync_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  mailpit_data:
  keycloak_db_data:
  openfga_db_data:
  minikms_db_data:
  clickstack_data:
  clickstack_ch_data:
  clickstack_ch_logs:
  clickstack_supervisor_data:
